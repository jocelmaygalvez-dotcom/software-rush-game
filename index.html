<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Rush - Badas NHS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #000000;      /* Sleek Black */
            --card-bg: #111111;       /* Dark charcoal */
            --accent-green: #22c55e;  /* Vibrant Badas Green */
            --accent-hover: #15803d;  /* Darker Green */
            --text-light: #ffffff;    /* Pure White */
            --text-muted: #a3a3a3;    /* Grey text */
            --error-red: #ef4444;     /* Warning Red */
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: var(--card-bg);
            border: 2px solid var(--accent-green);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.2);
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-sizing: border-box;
        }
        /* School Logo Box Section */
        .school-header {
            margin-bottom: 1.5rem;
        }
        .school-logo {
            width: 90px;
            height: 90px;
            object-fit: contain;
            border-radius: 50%;
            border: 2px solid var(--accent-green);
            background: #ffffff;
            padding: 4px;
        }
        .school-title {
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 5px;
        }
        h1 { 
            color: var(--accent-green); 
            margin: 0.5rem 0 1.5rem 0; 
            font-size: 2rem;
        }
        /* Icons & Stats Styling */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            font-size: 1.1rem;
        }
        .stat-item {
            background: #1e1e1e;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .timer-highlight { color: #eab308; border-color: #eab308; }
        .score-highlight { color: var(--accent-green); }
        
        .hint-box { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 10px; 
            margin: 20px 0; 
            font-style: italic; 
            border-left: 4px solid var(--accent-green);
            text-align: left;
            line-height: 1.5;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #333333;
            background: #000000;
            color: white;
            border-radius: 8px;
            font-size: 1.1rem;
            text-align: center;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus { 
            outline: none; 
            border-color: var(--accent-green); 
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
        }
        button {
            background-color: var(--accent-green);
            color: #000000;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: background 0.2s ease;
        }
        button:hover { background-color: var(--accent-hover); color: white; }
        .warning { color: var(--error-red); font-weight: bold; margin-top: 12px; min-height: 24px; font-size: 0.95rem; }
        .hidden { display: none; }
        #db-status { font-size: 0.9rem; color: var(--text-muted); margin-top: 20px; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <div class="school-header">
        <img class="school-logo" src="https://placehold.co/100x100/ffffff/000000?text=BNHS+Logo" alt="Badas NHS Logo">
        <div class="school-title">Badas National High School</div>
    </div>

    <div id="setup-screen">
        <h1>Software Rush</h1>
        <p style="color: var(--text-muted); margin-bottom: 20px;">Test your computer software skills! You have 5 minutes.</p>
        <input type="text" id="username" placeholder="Enter Learner's Name" required><br>
        <button id="start-btn">🎯 Start Game</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="stats-bar">
            <div class="stat-item timer-highlight">⏱️ <span id="time-display">05:00</span></div>
            <div class="stat-item score-highlight">⭐ Score: <span id="score-display">0</span></div>
        </div>
        <div class="hint-box" id="hint-display">Loading game challenge...</div>
        <input type="text" id="answer-input" placeholder="Type your answer..." autocomplete="off">
        <div class="warning" id="warning-msg"></div>
        <button id="submit-btn">✔️ Submit Answer</button>
    </div>

    <div id="end-screen" class="hidden">
        <h1>Game Over!</h1>
        <p>Your performance record has been compiled.</p>
        <div style="font-size: 1.5rem; margin: 20px 0;">Final Score: <span id="final-score" style="color: var(--accent-green); font-weight: bold;">0</span></div>
        <p id="db-status">📤 Communicating with secure database server...</p>
    </div>
</div>

<script>
    // --- SUPABASE CONFIGURATION ---
    // Update these strings with the values retrieved from your API keys settings view
    const SUPABASE_URL = 'https://xtcpzeihrblaueoxspum.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0Y3B6ZWlocmJsYXVlb3hzcHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MjI3MDgsImV4cCI6MjA5ODM5ODcwOH0.8pZU9RQWoLnXozsn-wVFeL3aZAXNt5dmj-Sjujbf8_U'; 
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- SOUND EFFECTS (Browser Synthesized - No hosting required!) ---
    const soundContext = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
        const osc = soundContext.createOscillator();
        const gain = soundContext.createGain();
        osc.connect(gain);
        gain.connect(soundContext.destination);
        
        if (type === 'correct') {
            // Reward sound: Short high chime
            osc.frequency.setValueAtTime(587.33, soundContext.currentTime); // D5
            osc.frequency.setValueAtTime(880, soundContext.currentTime + 0.1);  // A5
            gain.gain.setValueAtTime(0.1, soundContext.currentTime);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.01, soundContext.currentTime + 0.3);
            osc.stop(soundContext.currentTime + 0.3);
        } else if (type === 'wrong') {
            // Failure buzzer noise
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(130, soundContext.currentTime); // Low buzz
            gain.gain.setValueAtTime(0.1, soundContext.currentTime);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.01, soundContext.currentTime + 0.25);
            osc.stop(soundContext.currentTime + 0.25);
        } else if (type === 'gameover') {
            // Success fanfare structure
            osc.frequency.setValueAtTime(523.25, soundContext.currentTime); // C5
            osc.frequency.setValueAtTime(659.25, soundContext.currentTime + 0.15); // E5
            osc.frequency.setValueAtTime(783.99, soundContext.currentTime + 0.3); // G5
            osc.frequency.setValueAtTime(1046.50, soundContext.currentTime + 0.45); // C6
            gain.gain.setValueAtTime(0.1, soundContext.currentTime);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.01, soundContext.currentTime + 0.8);
            osc.stop(soundContext.currentTime + 0.8);
        }
    }

    // --- GAME DATA ---
    const questions = [
        { hint: "An open-source operating system symbolized by a penguin.", answer: "linux" },
        { hint: "A software application used to locate, retrieve, and display content on the World Wide Web (e.g., Chrome, Firefox).", answer: "browser" },
        { hint: "The system software that manages computer hardware, software resources, and provides common services for computer programs.", answer: "operating system" },
        { hint: "A type of malicious software designed to block access to a computer system until a sum of money is paid.", answer: "ransomware" },
        { hint: "A translator program that converts high-level source code into machine code all at once before execution.", answer: "compiler" },
        { hint: "Database management system software that uses tables, rows, and columns to link data points.", answer: "relational database" }
    ];

    // --- STATE VARIABLES ---
    let currentQuestionIndex = 0;
    let score = 0;
    let timeLeft = 300; // 5 minutes
    let timerInterval;
    let username = "";

    // --- DOM ELEMENTS ---
    const setupScreen = document.getElementById('setup-screen');
    const gameScreen = document.getElementById('game-screen');
    const endScreen = document.getElementById('end-screen');
    const usernameInput = document.getElementById('username');
    const answerInput = document.getElementById('answer-input');
    const hintDisplay = document.getElementById('hint-display');
    const warningMsg = document.getElementById('warning-msg');
    const scoreDisplay = document.getElementById('score-display');
    const timeDisplay = document.getElementById('time-display');
    const finalScoreDisplay = document.getElementById('final-score');
    const dbStatus = document.getElementById('db-status');

    // --- INTERACTIVE ACTIONS ---
    document.getElementById('start-btn').addEventListener('click', () => {
        username = usernameInput.value.trim();
        if(!username) { alert("Please enter the learner's name!"); return; }
        
        soundContext.resume(); // Unlock browser audio safety mechanism
        setupScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        
        loadQuestion();
        startTimer();
    });

    function loadQuestion() {
        if(currentQuestionIndex >= questions.length) {
            endGame();
            return;
        }
        hintDisplay.innerHTML = `💡 <b>Hint:</b> ${questions[currentQuestionIndex].hint}`;
        answerInput.value = "";
        warningMsg.textContent = "";
    }

    function checkAnswer() {
        let userAnswer = answerInput.value.trim().toLowerCase();
        let correctAnswer = questions[currentQuestionIndex].answer.toLowerCase();

        if (userAnswer === correctAnswer) {
            playSound('correct');
            score += 10;
            scoreDisplay.textContent = score;
            currentQuestionIndex++;
            loadQuestion();
        } else {
            playSound('wrong');
            warningMsg.textContent = "❌ Incorrect configuration concept. Revise answer to continue.";
        }
    }

    document.getElementById('submit-btn').addEventListener('click', checkAnswer);
    answerInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') checkAnswer(); });

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            if(timeLeft <= 0) {
                endGame();
            }
        }, 1000);
    }

    async function endGame() {
        clearInterval(timerInterval);
        playSound('gameover');
        gameScreen.classList.add('hidden');
        endScreen.classList.remove('hidden');
        finalScoreDisplay.textContent = score;

        try {
            const { data, error } = await _supabase
                .from('sw_rush_scores')
                .insert([{ student_name: username, final_score: score }]);
            
            if (error) throw error;
            dbStatus.style.color = "#22c55e";
            dbStatus.textContent = "✅ Performance record successfully finalized in Supabase!";
        } catch (err) {
            console.error(err);
            dbStatus.style.color = "#ef4444";
            dbStatus.textContent = `❌ Secure Write Failure: ${err.message || JSON.stringify(err)}`;
        }
    }
</script>
</body>
</html>
