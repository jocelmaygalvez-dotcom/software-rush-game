<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Rush Game</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --error: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h1 { color: var(--accent); margin-top: 0; }
        .timer { font-size: 1.5rem; font-weight: bold; margin: 10px 0; color: #fbbf24; }
        .hint-box { background: #334155; padding: 15px; border-radius: 8px; margin: 15px 0; font-style: italic; }
        input[type="text"] {
            width: 80%;
            padding: 12px;
            border: 2px solid #475569;
            background: #0f172a;
            color: white;
            border-radius: 6px;
            font-size: 1rem;
            text-align: center;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent); }
        button {
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
        }
        button:hover { opacity: 0.9; }
        .warning { color: var(--error); font-weight: bold; margin-top: 10px; height: 20px; }
        .hidden { display: none; }
        #db-status { font-size: 0.9rem; color: #94a3b8; margin-top: 15px; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h1>Software Rush</h1>
        <p>Test your knowledge of computer software! You have 5 minutes.</p>
        <input type="text" id="username" placeholder="Enter your name" required><br>
        <button id="start-btn">Start Game</button>
    </div>

    <div id="game-screen" class="hidden">
        <h1>Identify the Software</h1>
        <div class="timer">Time Left: <span id="time-display">05:00</span></div>
        <div>Score: <span id="score-display">0</span></div>
        <div class="hint-box" id="hint-display">Loading hint...</div>
        <input type="text" id="answer-input" placeholder="Type your answer here..." autocomplete="off">
        <div class="warning" id="warning-msg"></div>
        <button id="submit-btn">Submit Answer</button>
    </div>

    <div id="end-screen" class="hidden">
        <h1>Game Over!</h1>
        <p>Thank you for playing.</p>
        <h2>Your Final Score: <span id="final-score">0</span></h2>
        <p id="db-status">Saving your score to database...</p>
    </div>
</div>

<script>
    // --- SUPABASE CONFIGURATION ---
    // PUT YOUR ACTUAL KEYS IN THE STRINGS BELOW
    const SUPABASE_URL = 'https://xtcpzeihrblaueoxspum.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0Y3B6ZWlocmJsYXVlb3hzcHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MjI3MDgsImV4cCI6MjA5ODM5ODcwOH0.8pZU9RQWoLnXozsn-wVFeL3aZAXNt5dmj-Sjujbf8_U';
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- GAME DATA ---
    const questions = [
        { hint: "An open-source operating system symbolized by a penguin.", answer: "linux" },
        { hint: "A software application used to locate, retrieve, and display content on the World Wide Web (e.g., Chrome, Firefox).", answer: "browser" },
        { hint: "The system software that manages computer hardware, software resources, and provides common services for computer programs.", answer: "operating system" },
        { hint: "A type of malicious software designed to block access to a computer system until a sum of money is paid.", answer: "ransomware" },
        { hint: "A translator program that converts high-level source code into machine code all at once before execution.", answer: "compiler" },
        { hint: "Database management system software that uses tables, rows, and columns to link data points.", answer: "relational database" }
    ];

    // --- STATE VARIABLES ---
    let currentQuestionIndex = 0;
    let score = 0;
    let timeLeft = 300; // 5 minutes
    let timerInterval;
    let username = "";

    // --- DOM ELEMENTS ---
    const setupScreen = document.getElementById('setup-screen');
    const gameScreen = document.getElementById('game-screen');
    const endScreen = document.getElementById('end-screen');
    const usernameInput = document.getElementById('username');
    const answerInput = document.getElementById('answer-input');
    const hintDisplay = document.getElementById('hint-display');
    const warningMsg = document.getElementById('warning-msg');
    const scoreDisplay = document.getElementById('score-display');
    const timeDisplay = document.getElementById('time-display');
    const finalScoreDisplay = document.getElementById('final-score');
    const dbStatus = document.getElementById('db-status');

    // --- GAME LOGIC ---
    document.getElementById('start-btn').addEventListener('click', () => {
        username = usernameInput.value.trim();
        if(!username) { alert("Please enter a name!"); return; }
        
        setupScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        
        loadQuestion();
        startTimer();
    });

    function loadQuestion() {
        if(currentQuestionIndex >= questions.length) {
            endGame();
            return;
        }
        hintDisplay.textContent = questions[currentQuestionIndex].hint;
        answerInput.value = "";
        warningMsg.textContent = "";
    }

    function checkAnswer() {
        let userAnswer = answerInput.value.trim().toLowerCase();
        let correctAnswer = questions[currentQuestionIndex].answer.toLowerCase();

        if (userAnswer === correctAnswer) {
            score += 10;
            scoreDisplay.textContent = score;
            currentQuestionIndex++;
            loadQuestion();
        } else {
            warningMsg.textContent = "❌ Incorrect! Check your concepts and try again.";
        }
    }

    document.getElementById('submit-btn').addEventListener('click', checkAnswer);
    answerInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') checkAnswer(); });

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                endGame();
            }
        }, 1000);
    }

    async function endGame() {
        clearInterval(timerInterval);
        gameScreen.classList.add('hidden');
        endScreen.classList.remove('hidden');
        finalScoreDisplay.textContent = score;

        dbStatus.style.color = "#94a3b8";
        dbStatus.textContent = "Saving your score to database...";

        // Push data to Supabase table: sw_rush_scores
        try {
            const { data, error } = await _supabase
                .from('sw_rush_scores')
                .insert([{ student_name: username, final_score: score }]);
            
            if (error) {
                throw error;
            } else {
                dbStatus.style.color = "#4ade80";
                dbStatus.textContent = "✅ Score successfully tracked in Supabase!";
            }
        } catch (err) {
            console.error("Database Save Error Details: ", err);
            dbStatus.style.color = "#ef4444";
            // Displays exact internal message from your database instance context
            dbStatus.textContent = `❌ DB Error: ${err.message || JSON.stringify(err)}`;
        }
    }
</script>
</body>
</html>
